<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildHelper - Помощник строителя</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="images/logo.png" alt="Logo" class="logo-img">
                <span class="logo-text">Build Helper</span>
            </a>

            <div id="auth-links" class="nav-links">
                <a href="/login.html">Вход</a>
                <a href="/register.html">Регистрация</a>
            </div>
        </nav>
    </header>

    <main id="content">
        <!-- Контент будет загружаться здесь -->
         <section class="hero">
            <div class="hero-container">
                <div class="hero-content">
                    <h1>BuildHelper - <br><span>Ваш цифровой помощник</span></h1>
                    <p>Расчитайте материалы, следите за новостями и узнавайте о лучших предложениях в магазинах.</p>
                    <div class="hero-actions">
                        <a href="#calculators" class="btn btn-primary">Калькуляторы</a>
                        <a href="#news" class="btn btn-secondary">Новости</a>
                    </div>
                </div>
                <div class="hero-visual">
                    <!-- SVG иконка инструментов -->
                    <div class="tech-placeholder">
                        <div class="grid-lines"></div>
                        <div class="blueprint-card">Blueprint v.1.0</div>
                    </div>
                </div>
            </div>
         </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
